<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Quiz — Countries Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

  <nav id="quiz-nav">
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      World Map
    </a>
    <div class="nav-brand">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span>Flag Quiz</span>
    </div>
    <div class="nav-spacer"></div>
  </nav>

  <main id="quiz-main">

    <!-- LOADING -->
    <div id="quiz-loading" class="quiz-loading">
      <div class="spinner"></div>
      <p>Loading flags…</p>
    </div>

    <!-- START SCREEN -->
    <section id="quiz-start" class="quiz-screen hidden">
      <div class="start-card glass-card">
        <div class="start-icon">🏳</div>
        <h1 class="start-title">Flag Quiz</h1>
        <p class="start-desc">Guess the country from its flag. 10 questions per round.</p>

        <div class="start-options">
          <div class="option-group">
            <label class="option-label" for="quiz-continent">Continent</label>
            <select id="quiz-continent" class="glass-select">
              <option value="all">All Continents</option>
              <option value="Africa">Africa</option>
              <option value="Americas">Americas</option>
              <option value="Asia">Asia</option>
              <option value="Europe">Europe</option>
              <option value="Oceania">Oceania</option>
            </select>
          </div>

          <div class="option-group">
            <label class="option-label" for="quiz-difficulty">Difficulty</label>
            <select id="quiz-difficulty" class="glass-select">
              <option value="easy">Easy — same region options</option>
              <option value="hard">Hard — worldwide options</option>
            </select>
          </div>
        </div>

        <button id="btn-start-quiz" class="btn-primary">
          Start Quiz
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>
        </button>

        <div id="best-score-display" class="best-score hidden">
          Best score: <strong id="best-score-value"></strong>
        </div>
      </div>
    </section>

    <!-- ACTIVE QUIZ -->
    <section id="quiz-active" class="quiz-screen hidden">
      <div class="quiz-progress-bar-container">
        <div id="quiz-progress-fill" class="progress-fill"></div>
      </div>

      <div class="quiz-header">
        <div class="quiz-meta">
          <span id="quiz-question-num" class="question-num">Question 1 / 10</span>
        </div>
        <div class="quiz-score-display">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span id="quiz-score">0</span>
        </div>
      </div>

      <div class="quiz-card glass-card">
        <div class="flag-display">
          <img id="quiz-flag-img" src="" alt="Mystery flag">
          <div id="flag-skeleton" class="flag-skeleton"></div>
        </div>
        <p class="quiz-prompt">Which country does this flag belong to?</p>
        <div id="answer-options" class="options-grid"></div>
      </div>
    </section>

    <!-- RESULTS SCREEN -->
    <section id="quiz-results" class="quiz-screen hidden">
      <div class="results-card glass-card">
        <div id="results-emoji" class="results-emoji"></div>
        <h2 id="results-title" class="results-title"></h2>
        <p id="results-subtitle" class="results-subtitle"></p>

        <div class="results-score-ring">
          <svg viewBox="0 0 120 120" class="score-ring-svg">
            <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
            <circle id="score-ring-fill" cx="60" cy="60" r="50" fill="none"
                    stroke="#3b82f6" stroke-width="8"
                    stroke-linecap="round"
                    stroke-dasharray="314.16"
                    stroke-dashoffset="314.16"
                    transform="rotate(-90 60 60)"
                    style="transition: stroke-dashoffset 1s ease"/>
          </svg>
          <div class="score-ring-text">
            <span id="results-score-num" class="score-big">0</span>
            <span class="score-denom">/ 10</span>
          </div>
        </div>

        <div class="results-actions">
          <button id="btn-retry" class="btn-primary">Play Again</button>
          <a href="index.html" class="btn-secondary">Back to Map</a>
        </div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
